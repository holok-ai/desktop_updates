<div class="threads-page">
  <div class="page-header">
    <h1 class="page-title">Thread Management</h1>
    <div class="header-actions">
      <button 
        pButton 
        type="button" 
        label="Refresh" 
        icon="pi pi-refresh" 
        class="p-button-outlined"
        (click)="refreshThreads()"
        [loading]="loading">
      </button>
      <button 
        pButton 
        type="button" 
        label="New Thread" 
        icon="pi pi-plus" 
        (click)="openCreateDialog()">
      </button>
    </div>
  </div>

  <p-card>
    <ng-template pTemplate="header">
      <div class="card-header">
        <i class="pi pi-comments"></i>
        <h2>Threads</h2>
      </div>
    </ng-template>

    <p-table 
      [value]="threads" 
      [loading]="loading"
      styleClass="p-datatable-sm"
      responsiveLayout="scroll">
      
      <ng-template pTemplate="header">
        <tr>
          <th>Title</th>
          <th>Description</th>
          <th>Status</th>
          <th>Created</th>
          <th>Updated</th>
          <th style="width: 120px">Actions</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-thread>
        <tr>
          <td>{{ thread.title }}</td>
          <td>{{ thread.description }}</td>
          <td>
            <span class="status-badge" [ngClass]="getStatusClass(thread.status)">
              {{ thread.status }}
            </span>
          </td>
          <td>{{ formatDate(thread.createdAt) }}</td>
          <td>{{ formatDate(thread.updatedAt) }}</td>
          <td>
            <div class="action-buttons">
              <button 
                pButton 
                type="button" 
                icon="pi pi-eye" 
                class="p-button-text p-button-sm"
                (click)="viewThread(thread)"
                pTooltip="View"
                tooltipPosition="top">
              </button>
              <button 
                pButton 
                type="button" 
                icon="pi pi-pen-to-square" 
                class="p-button-text p-button-sm"
                (click)="openEditDialog(thread)"
                pTooltip="Edit"
                tooltipPosition="top">
              </button>
              <button 
                pButton 
                type="button" 
                icon="pi pi-trash" 
                class="p-button-text p-button-sm p-button-danger"
                (click)="deleteThread(thread)"
                pTooltip="Delete"
                tooltipPosition="top">
              </button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" class="text-center">
            <div class="empty-state">
              <i class="pi pi-inbox"></i>
              <p>No threads found. Create your first thread to get started.</p>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>

  <!-- Create/Edit Dialog -->
  <p-dialog 
    [(visible)]="displayDialog" 
    [header]="isEditMode ? 'Edit Thread' : 'Create Thread'"
    [modal]="true"
    [style]="{width: '600px'}"
    [draggable]="false"
    [resizable]="false">
    
    <div class="dialog-content">
      <div class="field">
        <label for="title">Title *</label>
        <input 
          id="title"
          type="text" 
          pInputText 
          [(ngModel)]="threadForm.title"
          class="w-full"
          placeholder="Enter thread title"
          required>
      </div>

      <div class="field">
        <label for="description">Description *</label>
        <textarea 
          id="description"
          pInputTextarea 
          [(ngModel)]="threadForm.description"
          class="w-full"
          rows="4"
          placeholder="Enter thread description"
          required>
        </textarea>
      </div>

      <div class="field">
        <label for="status">Status *</label>
        <p-dropdown 
          id="status"
          [(ngModel)]="threadForm.status"
          [options]="statusOptions"
          optionLabel="label"
          optionValue="value"
          class="w-full"
          placeholder="Select status">
        </p-dropdown>
      </div>
    </div>

    <ng-template pTemplate="footer">
      <button 
        pButton 
        type="button" 
        label="Cancel" 
        icon="pi pi-times" 
        class="p-button-text"
        (click)="displayDialog = false">
      </button>
      <button 
        pButton 
        type="button" 
        [label]="isEditMode ? 'Update' : 'Create'" 
        icon="pi pi-check"
        (click)="saveThread()"
        [disabled]="!threadForm.title || !threadForm.description">
      </button>
    </ng-template>
  </p-dialog>

  <!-- Toast for notifications -->
  <p-toast></p-toast>
</div>
